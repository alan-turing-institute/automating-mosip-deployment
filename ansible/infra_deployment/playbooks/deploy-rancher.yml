---
# Prepare cluster nodes for RKE2
- name: Prepare physical VMs for RKE2
  hosts: physical_vms
  gather_facts: true
  serial: 1
  roles:
    - rke2_prepare

# Cluster orchestration from deployment node
- name: Initialize RKE2 cluster state
  hosts: deployment
  gather_facts: true
  roles:
    - role: rke2_deploy
      tasks_from: check_cluster.yml
    - role: rke2_deploy
      tasks_from: token.yml

# Install primary control plane
- name: Install RKE2 primary control plane
  hosts: control_plane_primary
  become: true
  gather_facts: true
  serial: 1
  vars:
    rke2_cluster_exists: "{{ hostvars[groups['deployment'][0]]['rke2_cluster_exists'] | default(false) }}"
    rke2_cluster_token: "{{ hostvars[groups['deployment'][0]]['rke2_cluster_token'] }}"
  roles:
    - role: rke2_deploy
      tasks_from: primary.yml

# Install subsequent nodes
- name: Install RKE2 subsequent nodes
  hosts: control_plane_subsequent:rke2_agents:rke2_etcd
  become: true
  gather_facts: true
  serial: 1
  vars:
    rke2_cluster_exists: "{{ hostvars[groups['deployment'][0]]['rke2_cluster_exists'] | default(false) }}"
    rke2_cluster_token: "{{ hostvars[groups['deployment'][0]]['rke2_cluster_token'] }}"
    rke2_primary_ip: "{{ hostvars[groups['deployment'][0]]['rke2_primary_ip'] }}"
  roles:
    - role: rke2_deploy
      tasks_from: subsequent.yml

# Fetch kubeconfig and optional Rancher import
- name: Finalize RKE2 cluster on deployment node
  hosts: deployment
  gather_facts: true
  vars:
    rke2_cluster_exists: "{{ hostvars[groups['deployment'][0]]['rke2_cluster_exists'] | default(false) }}"
    rke2_primary_ip: "{{ hostvars[groups['deployment'][0]]['rke2_primary_ip'] }}"
  roles:
    - role: rke2_deploy
      tasks_from: kubeconfig.yml
    - role: rke2_deploy
      tasks_from: rancher_import.yml
