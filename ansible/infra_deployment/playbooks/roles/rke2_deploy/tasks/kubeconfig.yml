---
- name: Skip kubeconfig fetch when cluster already existed before this run
  when: rke2_cluster_exists | default(false)
  block:
    - name: Verify existing cluster nodes
      command: kubectl --kubeconfig={{ cluster_dir }}/kube_config_cluster.yml get nodes
      register: existing_nodes
      changed_when: false

    - name: Display existing cluster nodes
      debug:
        msg: "{{ existing_nodes.stdout_lines }}"

- name: Fetch and normalize kubeconfig from primary
  when: not rke2_cluster_exists | default(false)
  block:
    - name: Wait for all nodes to be registered
      command: kubectl --kubeconfig={{ rke2_config_dir }}/rke2.yaml get nodes
      register: node_status
      until: node_status.rc == 0 and 'NotReady' not in node_status.stdout
      retries: 30
      delay: 10
      delegate_to: "{{ groups['control_plane_primary'][0] }}"
      become: true

    - name: Read primary kubeconfig
      slurp:
        src: "{{ rke2_config_dir }}/rke2.yaml"
      register: primary_kubeconfig
      delegate_to: "{{ groups['control_plane_primary'][0] }}"
      become: true

    - name: Write deployment-node kubeconfig
      copy:
        dest: "{{ cluster_dir }}/kube_config_cluster.yml"
        content: >-
          {{ (primary_kubeconfig.content | b64decode)
             | regex_replace('127.0.0.1', rke2_primary_ip)
             | regex_replace('default', cluster_name) }}
        mode: '0600'

    - name: Create .kube directory on deployment node
      file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0700'

    - name: Copy kubeconfig to default location
      copy:
        src: "{{ cluster_dir }}/kube_config_cluster.yml"
        dest: "{{ ansible_env.HOME }}/.kube/config"
        mode: '0600'
        remote_src: yes

    - name: Verify cluster from deployment node
      command: kubectl --kubeconfig={{ cluster_dir }}/kube_config_cluster.yml get nodes
      register: cluster_nodes
      changed_when: false

    - name: Display cluster nodes
      debug:
        msg: "{{ cluster_nodes.stdout_lines }}"
