---
- name: Ensure cluster directory exists before kubeconfig sync
  ansible.builtin.file:
    path: "{{ cluster_dir }}"
    state: directory
    mode: '0750'

- name: Verify existing cluster nodes when kubeconfig is already valid
  ansible.builtin.command: kubectl --kubeconfig={{ cluster_dir }}/kube_config_cluster.yml get nodes
  register: existing_nodes
  changed_when: false
  when: rke2_cluster_exists | default(false)

- name: Report existing cluster nodes
  ansible.builtin.debug:
    msg: "{{ existing_nodes.stdout_lines }}"
  when: rke2_cluster_exists | default(false)

- name: Check custom kubeconfig path on cluster primary
  ansible.builtin.stat:
    path: "{{ rke2_config_dir }}/rke2.yaml"
  register: rke2_custom_kubeconfig
  delegate_to: "{{ rke2_kubeconfig_delegate_host }}"
  become: true
  when: not (rke2_cluster_exists | default(false))

- name: Check default kubeconfig path on cluster primary
  ansible.builtin.stat:
    path: "{{ rke2_default_kubeconfig_path }}"
  register: rke2_default_kubeconfig
  delegate_to: "{{ rke2_kubeconfig_delegate_host }}"
  become: true
  when:
    - not (rke2_cluster_exists | default(false))
    - not (rke2_custom_kubeconfig.stat.exists | default(false))

- name: Resolve kubeconfig source path on cluster primary
  ansible.builtin.set_fact:
    rke2_source_kubeconfig_path: >-
      {{
        rke2_config_dir ~ '/rke2.yaml'
        if (rke2_custom_kubeconfig.stat.exists | default(false))
        else rke2_default_kubeconfig_path
      }}
  when: not (rke2_cluster_exists | default(false))

- name: Fail when cluster primary kubeconfig is missing
  ansible.builtin.fail:
    msg: >-
      Could not find kubeconfig on {{ rke2_kubeconfig_delegate_host }} at either
      {{ rke2_config_dir }}/rke2.yaml or {{ rke2_default_kubeconfig_path }}.
  when:
    - not (rke2_cluster_exists | default(false))
    - not (rke2_custom_kubeconfig.stat.exists | default(false))
    - not (rke2_default_kubeconfig.stat.exists | default(false))

- name: Wait for cluster nodes to become ready before kubeconfig export
  ansible.builtin.command: kubectl --kubeconfig={{ rke2_source_kubeconfig_path }} get nodes
  register: node_status
  until: node_status.rc == 0 and 'NotReady' not in node_status.stdout
  retries: 30
  delay: 10
  changed_when: false
  delegate_to: "{{ rke2_kubeconfig_delegate_host }}"
  become: true
  when: not (rke2_cluster_exists | default(false))

- name: Read kubeconfig from cluster primary
  ansible.builtin.slurp:
    src: "{{ rke2_source_kubeconfig_path }}"
  register: source_kubeconfig
  delegate_to: "{{ rke2_kubeconfig_delegate_host }}"
  become: true
  when: not (rke2_cluster_exists | default(false))

- name: Parse source kubeconfig
  ansible.builtin.set_fact:
    rke2_kubeconfig_parsed: "{{ source_kubeconfig.content | b64decode | from_yaml }}"
  when: not (rke2_cluster_exists | default(false))

- name: Resolve kubeconfig endpoint host
  ansible.builtin.set_fact:
    rke2_api_host: "{{ rke2_primary_ip | default(hostvars[rke2_kubeconfig_delegate_host]['ansible_host']) }}"
  when: not (rke2_cluster_exists | default(false))

- name: Build normalized kubeconfig data structure
  ansible.builtin.set_fact:
    rke2_kubeconfig_normalized:
      apiVersion: "{{ rke2_kubeconfig_parsed.apiVersion | default('v1') }}"
      kind: Config
      preferences: "{{ rke2_kubeconfig_parsed.preferences | default({}) }}"
      users: "{{ rke2_kubeconfig_parsed.users | default([]) }}"
      clusters:
        - name: "{{ cluster_name }}"
          cluster: "{{ rke2_selected_cluster.cluster | combine({'server': 'https://' ~ rke2_api_host ~ ':6443'}, recursive=True) }}"
      contexts:
        - name: "{{ cluster_name }}"
          context: "{{ rke2_selected_context.context | combine({'cluster': cluster_name}, recursive=True) }}"
      current-context: "{{ cluster_name }}"
  vars:
    rke2_selected_cluster: >-
      {{
        (rke2_kubeconfig_parsed.clusters | default([]) | selectattr('name', 'equalto', 'default') | list | first)
        | default((rke2_kubeconfig_parsed.clusters | default([]) | first), true)
      }}
    rke2_selected_context: >-
      {{
        (rke2_kubeconfig_parsed.contexts | default([]) | selectattr('name', 'equalto', 'default') | list | first)
        | default((rke2_kubeconfig_parsed.contexts | default([]) | first), true)
      }}
  when: not (rke2_cluster_exists | default(false))

- name: Ensure normalized kubeconfig has cluster and context data
  ansible.builtin.assert:
    that:
      - rke2_kubeconfig_normalized.clusters | length > 0
      - rke2_kubeconfig_normalized.contexts | length > 0
    fail_msg: "Source kubeconfig on {{ rke2_kubeconfig_delegate_host }} is missing required clusters/contexts entries."
  when: not (rke2_cluster_exists | default(false))

- name: Write deployment-node kubeconfig
  ansible.builtin.copy:
    dest: "{{ cluster_dir }}/kube_config_cluster.yml"
    content: "{{ rke2_kubeconfig_normalized | to_nice_yaml(indent=2) }}"
    mode: '0600'
  when: not (rke2_cluster_exists | default(false))

- name: Create .kube directory on deployment node
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0700'

- name: Copy kubeconfig to default location
  ansible.builtin.copy:
    src: "{{ cluster_dir }}/kube_config_cluster.yml"
    dest: "{{ ansible_env.HOME }}/.kube/config"
    mode: '0600'
    remote_src: true

- name: Verify cluster from deployment node
  ansible.builtin.command: kubectl --kubeconfig={{ cluster_dir }}/kube_config_cluster.yml get nodes
  register: cluster_nodes
  changed_when: false

- name: Assert deployment-node kubeconfig exists
  ansible.builtin.stat:
    path: "{{ cluster_dir }}/kube_config_cluster.yml"
  register: deployment_kubeconfig_stat

- name: Fail when deployment kubeconfig is missing
  ansible.builtin.fail:
    msg: "Expected kubeconfig not found at {{ cluster_dir }}/kube_config_cluster.yml"
  when: not deployment_kubeconfig_stat.stat.exists

- name: Display cluster nodes and deployment artifacts
  ansible.builtin.debug:
    msg:
      - "{{ cluster_nodes.stdout_lines }}"
      - "Deployment node kubeconfig: {{ cluster_dir }}/kube_config_cluster.yml"
      - "Deployment node token: {{ rke2_token_file }}"
