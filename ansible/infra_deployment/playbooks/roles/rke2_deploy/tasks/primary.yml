---
- name: Skip primary install when cluster already exists
  meta: end_host
  when: rke2_cluster_exists | default(false)

- name: Check if RKE2 server is already active
  systemd:
    name: rke2-server
  register: primary_rke2_status
  failed_when: false

- name: Skip primary when service already active
  meta: end_host
  when: primary_rke2_status.status is defined and primary_rke2_status.status.ActiveState == "active"

- name: Create RKE2 config directory
  file:
    path: "{{ rke2_config_dir }}"
    state: directory
    mode: '0750'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid | default(ansible_user_id) }}"

- name: Install RKE2 on primary node
  shell: |
    curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION="{{ rke2_version }}" sh -
  args:
    creates: /usr/local/bin/rke2

- name: Point RKE2 server systemd unit at user config path
  import_tasks: systemd_config_path.yml
  vars:
    rke2_systemd_service: rke2-server

- name: Render primary RKE2 config
  template:
    src: rke2-server-control-plane-primary.conf.j2
    dest: "{{ rke2_config_dir }}/config.yaml"
    mode: '0600'
  no_log: true

- name: Start and enable RKE2 server
  systemd:
    name: rke2-server
    enabled: yes
    state: restarted

- name: Wait for RKE2 kubeconfig on primary
  wait_for:
    path: "{{ rke2_config_dir }}/rke2.yaml"
    timeout: 300

- name: Wait for Kubernetes API on primary
  wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    timeout: 300
    delay: 15

- name: Create kubectl symlink on primary
  file:
    src: /var/lib/rancher/rke2/bin/kubectl
    dest: /usr/local/bin/kubectl
    state: link
    force: yes
