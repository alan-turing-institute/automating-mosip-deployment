---
- name: Explain skip when cluster already exists
  ansible.builtin.debug:
    msg: "Skipping join-node install for '{{ cluster_name }}' because deployment node already has a working kubeconfig."
  when: rke2_cluster_exists | default(false)

- name: Determine RKE2 node role
  ansible.builtin.set_fact:
    rke2_node_template: >-
      {{
        'rke2-server-control-plane-subsequent.conf.j2'
        if inventory_hostname in groups.get('control_plane_subsequent', [])
        else 'rke2-etcd-agents.conf.j2'
        if inventory_hostname in groups.get('rke2_etcd', [])
        else 'rke2-agents.conf.j2'
      }}
    rke2_service_name: >-
      {{
        'rke2-server'
        if inventory_hostname in groups.get('control_plane_subsequent', [])
        else 'rke2-agent'
      }}
  when: not (rke2_cluster_exists | default(false))

- name: Check if RKE2 service is already active
  ansible.builtin.systemd:
    name: "{{ rke2_service_name }}"
  register: node_rke2_status
  failed_when: false
  when: not (rke2_cluster_exists | default(false))

- name: Set node service active fact
  ansible.builtin.set_fact:
    rke2_node_service_active: "{{ node_rke2_status.status is defined and node_rke2_status.status.ActiveState == 'active' }}"
  when: not (rke2_cluster_exists | default(false))

- name: Explain node skip when service already active
  ansible.builtin.debug:
    msg: "RKE2 service '{{ rke2_service_name }}' already active on {{ inventory_hostname }}. Skipping install."
  when:
    - not (rke2_cluster_exists | default(false))
    - rke2_node_service_active | default(false)

- name: Wait for primary RKE2 supervisor API
  ansible.builtin.wait_for:
    port: 9345
    host: "{{ rke2_primary_ip }}"
    timeout: 300
  when:
    - not (rke2_cluster_exists | default(false))
    - not (rke2_node_service_active | default(false))

- name: Install and configure join node
  when:
    - not (rke2_cluster_exists | default(false))
    - not (rke2_node_service_active | default(false))
  block:
    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: "{{ rke2_config_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_gid'] | default(ansible_facts['user_id']) }}"

    - name: Install RKE2 on node
      ansible.builtin.shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION="{{ rke2_version }}" sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Point RKE2 systemd unit at user config path
      ansible.builtin.import_tasks: systemd_config_path.yml
      vars:
        rke2_systemd_service: "{{ rke2_service_name }}"

    - name: Render RKE2 config for node
      ansible.builtin.template:
        src: "{{ rke2_node_template }}"
        dest: "{{ rke2_config_dir }}/config.yaml"
        mode: '0600'
      no_log: true

    - name: Start and enable RKE2 service on node
      ansible.builtin.systemd:
        name: "{{ rke2_service_name }}"
        enabled: true
        state: started

- name: Ensure RKE2 systemd config path is set on active node
  ansible.builtin.import_tasks: systemd_config_path.yml
  vars:
    rke2_systemd_service: "{{ rke2_service_name }}"
  when:
    - not (rke2_cluster_exists | default(false))
    - rke2_node_service_active | default(false)

