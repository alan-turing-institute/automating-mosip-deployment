---
- name: Ensure RKE2 systemd env directory exists
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Point RKE2 systemd service at custom config file
  lineinfile:
    path: "/etc/rancher/rke2/{{ rke2_systemd_service }}.env"
    regexp: '^RKE2_CONFIG_FILE='
    line: "RKE2_CONFIG_FILE={{ rke2_config_dir }}/config.yaml"
    create: true
    mode: '0600'

- name: Reload systemd after RKE2 env change
  systemd:
    daemon_reload: yes
