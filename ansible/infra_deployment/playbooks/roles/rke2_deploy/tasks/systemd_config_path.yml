---
- name: Ensure RKE2 systemd env directory exists
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Configure RKE2 server config file path
  copy:
    dest: /etc/rancher/rke2/rke2-server.env
    content: |
      RKE2_CONFIG_FILE={{ rke2_config_dir }}/config.yaml
    mode: '0600'
  when: rke2_systemd_service | default('rke2-server') == 'rke2-server'

- name: Configure RKE2 agent config file path
  copy:
    dest: /etc/rancher/rke2/rke2-agent.env
    content: |
      RKE2_CONFIG_FILE={{ rke2_config_dir }}/config.yaml
    mode: '0600'
  when: rke2_systemd_service | default('rke2-server') == 'rke2-agent'

- name: Reload systemd after RKE2 config path change
  systemd:
    daemon_reload: yes
