---
- name: Prepare Rancher OBS Node for RKE2
  hosts: mosip_obs
  gather_facts: true
  serial: 1
  roles:
    - rke2_prepare

- name: Deploy RKE2 OBS cluster
  hosts: mosip_obs
  become: true
  gather_facts: true
  serial: 1
  vars:
    cluster_dir: "{{ rancher_obs_base_dir | default('/home/ubuntu/rancher/obs') }}"
    rke2_config_dir: "{{ rke2_obs_config_dir | default('/home/ubuntu/rancher/obs/rke2') }}"
    rke2_token_file: "{{ cluster_dir }}/rke2_token"
  roles:
    - rke2_obs

- name: Deploy Nginx OBS Load Balancer
  hosts: nginx_obs
  gather_facts: true
  roles:
    - nginx_obs
