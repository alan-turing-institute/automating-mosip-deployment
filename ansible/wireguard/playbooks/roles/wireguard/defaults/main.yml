---
# Wireguard configuration
wireguard_network: "10.100.0.0/16"
wireguard_port: 51820
wireguard_mtu: 1330
wireguard_peers: 5

# Docker configuration
docker_user: "{{ ansible_user }}"
# Remote path on target host (do not use "~" to avoid controller-side expansion issues)
wireguard_config_dir: "{{ ansible_user_dir }}/wireguard/config"
wireguard_container_name: "wireguard"
wireguard_image: "ghcr.io/linuxserver/wireguard"

# System configuration
timezone: "Europe/London"
puid: 1000
pgid: 1000 